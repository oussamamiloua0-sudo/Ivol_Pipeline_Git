name: Droplet — Status / Stop

# Check what's running on the droplet, or kill an active backfill.

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        type: choice
        options:
          - status
          - slack-status
          - stream
          - stop

jobs:
  manage:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:

      - name: Check status
        if: ${{ github.event.inputs.action == 'status' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DROPLET_HOST }}
          username: root
          password: ${{ secrets.DROPLET_PASSWORD }}
          command_timeout: 30s
          script: |
            echo "===== Screen sessions ====="
            screen -ls || echo "(none)"

            echo ""
            echo "===== Latest backfill log (last 40 lines) ====="
            LOG=$(ls -t /tmp/spy_*.log /tmp/bf_*.log 2>/dev/null | head -1)
            if [ -n "$LOG" ]; then
              echo "File: $LOG"
              tail -40 "$LOG"
            else
              echo "(no active backfill log found)"
            fi

            echo ""
            echo "===== System memory ====="
            free -h

      - name: Slack status
        if: ${{ github.event.inputs.action == 'slack-status' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DROPLET_HOST }}
          username: root
          password: ${{ secrets.DROPLET_PASSWORD }}
          command_timeout: 30s
          script: |
            cd /opt/pipeline
            /opt/pipeline/.venv/bin/python scripts/backfill_status.py

      - name: Stream backfill log
        if: ${{ github.event.inputs.action == 'stream' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DROPLET_HOST }}
          username: root
          password: ${{ secrets.DROPLET_PASSWORD }}
          command_timeout: 350m
          script: |
            LOG=$(ls -t /tmp/spy_*.log /tmp/bf_*.log 2>/dev/null | head -1)
            if [ -z "$LOG" ]; then
              echo "No active backfill log found"
              exit 1
            fi
            echo "Streaming: $LOG"
            echo "====================================================================="
            OFFSET=0
            while true; do
              TOTAL=$(wc -l < "$LOG" 2>/dev/null || echo 0)
              if [ "$TOTAL" -gt "$OFFSET" ]; then
                sed -n "$((OFFSET+1)),${TOTAL}p" "$LOG"
                OFFSET=$TOTAL
                if grep -qE 'BACKFILL_COMPLETE|BACKFILL_FAILED' "$LOG" 2>/dev/null; then
                  echo "====================================================================="
                  grep -E 'BACKFILL_COMPLETE|BACKFILL_FAILED' "$LOG"
                  exit 0
                fi
              fi
              if ! screen -ls 2>/dev/null | grep -qE 'spy_|bf_'; then
                echo "====================================================================="
                echo "All backfill sessions ended."
                exit 0
              fi
              sleep 10
            done

      - name: Stop backfill
        if: ${{ github.event.inputs.action == 'stop' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DROPLET_HOST }}
          username: root
          password: ${{ secrets.DROPLET_PASSWORD }}
          command_timeout: 30s
          script: |
            SESSIONS=$(screen -ls 2>/dev/null | grep -oE '[0-9]+\.(spy_|bf_)[^ ]+' || true)
            if [ -n "$SESSIONS" ]; then
              echo "$SESSIONS" | xargs -I{} screen -S {} -X quit
              echo "Stopped: $SESSIONS"
            else
              echo "No active backfill session found"
            fi
